<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup - Smart AI Feed</title>

    <link rel="stylesheet" href="auth.css">

</head>

<body>

    <div class="auth-container">

        <h1>🔥 Create Account</h1>

        <p class="subtitle">
            Join Smart AI Feed
        </p>

        <!-- Username -->

        <input
            type="text"
            id="signup-username"
            placeholder="Enter Username"
        >

        <!-- Email -->

        <input
            type="email"
            id="signup-email"
            placeholder="Enter Email"
        >

        <!-- Password -->

        <input
            type="password"
            id="signup-password"
            placeholder="Enter Password"
        >

        <!-- Signup Button -->

        <button onclick="signupUser()">

            Signup

        </button>

        <!-- Login Redirect -->

        <p class="redirect-text">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

    <script src="auth.js"></script>

</body>

</html>
