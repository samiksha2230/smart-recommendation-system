<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<div class="auth-container">

    <h1>🚀 Smart AI Feed</h1>

    <input type="text"
           id="username"
           placeholder="Enter Username">

    <input type="password"
           id="password"
           placeholder="Enter Password">

    <button onclick="loginUser()">
        Login
    </button>

    <p>
        Don't have account?
        <a href="signup.html">
            Signup
        </a>
    </p>

</div>

<script src="auth.js"></script>

</body>

</html>
